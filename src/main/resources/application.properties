spring.application.name=BankApi

spring.config.import=optional:file:./.env[.properties]

spring.profiles.default=dev

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bank_api?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

server.port=${PORT:8080}
server.address=${SERVER_ADDRESS:127.0.0.1}

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

fraud.amount-threshold=${FRAUD_AMOUNT_THRESHOLD:5000}

spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

app.login-rate-limit.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
app.login-rate-limit.window=${LOGIN_RATE_LIMIT_WINDOW:PT10M}
app.login-rate-limit.cleanup-delay=${LOGIN_RATE_LIMIT_CLEANUP_DELAY:PT15M}
