spring.datasource.url=jdbc:h2:mem:bankapi;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

app.login-rate-limit.backend=memory
app.login-rate-limit.max-attempts=2
app.login-rate-limit.window=PT10M
management.health.redis.enabled=false

jwt.secret=change-this-test-secret-key-32-bytes-min
jwt.expiration-ms=3600000
